<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Crawler & Search Engine</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Configuration -->
        <aside class="glass-panel sidebar">
            <div class="branding">
                <div class="logo-icon">🕸️</div>
                <h2>Crawler<span class="accent">X</span></h2>
            </div>
            
            <div class="control-section">
                <h3>Configuration</h3>
                <form id="crawler-form">
                    <div class="input-group">
                        <label for="seeds">Seed URLs (comma separated)</label>
                        <textarea id="seeds" required placeholder="https://news.ycombinator.com"></textarea>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="input-group">
                            <label for="depth">Max Depth</label>
                            <input type="number" id="depth" value="3" min="0" max="10">
                        </div>
                        <div class="input-group">
                            <label for="workers">Workers</label>
                            <input type="number" id="workers" value="10" min="1" max="100">
                        </div>
                    </div>

                    <div class="action-buttons">
                        <button type="submit" id="btn-start" class="btn primary">Start Crawling</button>
                        <button type="button" id="btn-stop" class="btn danger" disabled>Stop</button>
                    </div>
                </form>
            </div>
            
            <div class="status-indicator">
                <div class="pulse-ring" id="status-pulse"></div>
                <span id="status-text">OFFLINE</span>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Stats Row -->
            <section class="metrics-row">
                <div class="glass-panel metric-card">
                    <div class="metric-icon">🚀</div>
                    <div class="metric-info">
                        <h4>Processed</h4>
                        <span id="metric-processed" class="metric-value">0</span>
                    </div>
                </div>
                
                <div class="glass-panel metric-card">
                    <div class="metric-icon">📑</div>
                    <div class="metric-info">
                        <h4>Indexed</h4>
                        <span id="metric-indexed" class="metric-value">0</span>
                    </div>
                </div>

                <div class="glass-panel metric-card" id="queue-card">
                    <div class="metric-icon">⏳</div>
                    <div class="metric-info">
                        <h4>Queued</h4>
                        <span id="metric-queued" class="metric-value">0</span>
                        <div class="progress-bar"><div id="queue-fill" class="progress-fill"></div></div>
                    </div>
                </div>

                <div class="glass-panel metric-card">
                    <div class="metric-icon">⚠️</div>
                    <div class="metric-info">
                        <h4>Errors</h4>
                        <span id="metric-errors" class="metric-value">0</span>
                    </div>
                </div>
                
                <div class="glass-panel metric-card">
                    <div class="metric-info">
                        <h4>Active Workers</h4>
                        <span id="metric-workers" class="metric-value">0 / 0</span>
                    </div>
                </div>
            </section>

            <!-- Search Section -->
            <section class="search-section glass-panel">
                <div class="search-container">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="search-input" autocomplete="off" placeholder="Search the live index...">
                </div>
                
                <div class="results-container" id="results-container">
                    <div class="empty-state">
                        Enter a query above to search the live indexed pages.
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>

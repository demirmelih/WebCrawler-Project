<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crawler Jobs | Web Crawler Engine</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="glass-panel topnav">
        <div class="branding" style="font-size: 1.25rem; font-weight: bold;">🕸️ Crawler<span class="accent">X</span></div>
        <div class="nav-links">
            <a href="/" class="active">Crawler Jobs</a>
            <a href="/status.html">Status</a>
            <a href="/search.html">Search</a>
        </div>
    </nav>

    <div class="app-container">
        <!-- Main Content -->
        <main class="main-content" style="max-width: 1000px; margin: 0 auto; width: 100%;">
            <!-- New Job Section -->
            <section class="glass-panel padded-panel mb-4">
                <div class="panel-header">
                    <h2>Launch New Crawler</h2>
                    <p class="text-muted" style="margin-top: 5px;">Create a new crawler operation with custom constraints.</p>
                </div>
                
                <form id="crawler-form" style="margin-top: 1.5rem;">
                    <div class="input-group">
                        <label for="seeds">Origin URL (Seed)</label>
                        <input type="url" id="seeds" required placeholder="https://news.ycombinator.com">
                    </div>
                    
                    <div class="stats-grid">
                        <div class="input-group">
                            <label for="depth">Max Depth</label>
                            <input type="number" id="depth" value="3" min="0" max="10">
                        </div>
                        <div class="input-group">
                            <label for="workers">Hit Rate (Workers)</label>
                            <input type="number" id="workers" value="10" min="1" max="100">
                        </div>
                        <div class="input-group">
                            <label for="rate">Pages / Second</label>
                            <input type="number" id="rate" value="2" step="0.1" min="0.1" max="50">
                        </div>
                        <div class="input-group">
                            <label for="queue-cap">Queue Capacity</label>
                            <input type="number" id="queue-cap" value="500" min="10" max="10000">
                        </div>
                    </div>

                    <div class="action-buttons" style="margin-top: 1rem; max-width: 250px;">
                        <button type="submit" id="btn-start" class="btn primary">Start Crawling</button>
                    </div>
                </form>
            </section>

            <!-- Jobs History -->
            <section class="glass-panel padded-panel">
                <div class="panel-header" style="margin-bottom: 1.5rem;">
                    <h2>Previous Operations</h2>
                    <p class="text-muted" style="margin-top: 5px;">History of past and currently running crawling jobs.</p>
                </div>
                
                <div class="jobs-list" id="jobs-list">
                    <div class="empty-state">Loading jobs...</div>
                </div>
            </section>
        </main>
    </div>
    <script src="crawler.js"></script>
</body>
</html>

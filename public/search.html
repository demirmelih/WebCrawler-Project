<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search | Web Crawler Engine</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="glass-panel topnav">
        <div class="branding" style="font-size: 1.25rem; font-weight: bold;">🕸️ Crawler<span class="accent">X</span></div>
        <div class="nav-links">
            <a href="/">Crawler Jobs</a>
            <a href="/status.html">Status</a>
            <a href="/search.html" class="active">Search</a>
        </div>
    </nav>

    <div class="app-container centered-app">
        <main class="main-content" style="max-width: 800px; margin: 0 auto; width: 100%;">
            <section class="search-hero" style="text-align: center; margin-bottom: 3rem; margin-top: 2rem;">
                <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Global Index Search</h1>
                <p class="text-muted" style="margin-bottom: 2rem;">Search across the aggregated filesystem indices returned from all crawler jobs.</p>
                
                <div class="search-container glass-panel" style="margin: 0;">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="search-input" autocomplete="off" placeholder="Enter query string (e.g. 'python framework')..." style="font-size: 1.25rem; padding: 1.5rem 1rem 1.5rem 4rem; background: transparent; border: none;">
                </div>
            </section>
            
            <div class="results-container" id="results-container">
                <div class="empty-state">
                    Results based on maximum hits from the filesystem will appear here.
                </div>
            </div>
        </main>
    </div>
    <script src="search.js"></script>
</body>
</html>
